<style>
        /* Custom Keyframes for Cinematic Floating Orbs */
        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .orb-primary {
            animation: drift 15s ease-in-out infinite;
        }
        .orb-secondary {
            animation: drift 18s ease-in-out infinite reverse;
        }
        
        /* Font embedding for Sora and JetBrains Mono */
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400&family=JetBrains+Mono:wght@500&family=Sora:wght@600;700&display=swap');

<body class="bg-background text-on-background min-h-screen relative overflow-hidden flex items-center justify-center selection:bg-secondary/30 selection:text-secondary">
<!-- Cinematic Background Ambient Orbs -->
<div class="fixed top-[10%] left-[15%] w-[400px] h-[400px] bg-primary/10 rounded-full blur-[120px] orb-primary pointer-events-none z-0"></div>
<div class="fixed bottom-[15%] right-[10%] w-[500px] h-[500px] bg-secondary/10 rounded-full blur-[140px] orb-secondary pointer-events-none z-0"></div>
<div class="fixed top-[60%] left-[40%] w-[250px] h-[250px] bg-tertiary/5 rounded-full blur-[90px] animate-pulse pointer-events-none z-0" style="animation-duration: 8s;"></div>
<!-- Main Login Card (Glassmorphism) -->
<main class="relative z-10 w-full max-w-[440px] mx-container-padding-mobile sm:mx-auto bg-surface/40 backdrop-blur-[40px] border border-white/5 rounded-xl shadow-[0_20px_60px_rgba(0,0,0,0.4)] p-8 sm:p-10 flex flex-col gap-8">
<!-- Header / Brand Anchor -->
<header class="flex flex-col items-center gap-2 text-center">
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tighter drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]">Projectfy</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Initialize Command Session</p>
</header>
<!-- Form Section -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="email">Operative ID / Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary transition-colors">mail</span>
<input class="w-full bg-surface-container-highest/30 backdrop-blur-[10px] border-b-2 border-white/10 rounded-t-DEFAULT px-4 py-3 pl-12 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-secondary focus:bg-surface-container-highest/50 transition-all" id="email" placeholder="designation@projectfy.io" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface" for="password">Access Code</label>
<a class="font-label-sm text-label-sm text-tertiary hover:text-tertiary-fixed hover:underline underline-offset-4 transition-all" href="#">Recover Protocol?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary transition-colors">lock</span>
<input class="w-full bg-surface-container-highest/30 backdrop-blur-[10px] border-b-2 border-white/10 rounded-t-DEFAULT px-4 py-3 pl-12 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-secondary focus:bg-surface-container-highest/50 transition-all" id="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Action -->
<button class="mt-2 w-full bg-secondary text-on-secondary font-headline-md text-headline-md !text-[18px] py-4 rounded-lg shadow-[0_0_20px_rgba(255,183,123,0.15)] hover:shadow-[0_0_35px_rgba(255,183,123,0.3)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 relative overflow-hidden group" type="submit">
<span class="relative z-10">Deploy Session</span>
<!-- Inner button light reflection -->
<div class="absolute inset-0 h-full w-full bg-gradient-to-b from-white/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</form>
<!-- Separator -->
<div class="flex items-center gap-4 w-full">
<div class="h-px bg-white/5 flex-grow"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Or Proxy Via</span>

</div>

<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 rounded-DEFAULT bg-white/5 border border-white/5 hover:bg-white/10 hover:border-white/20 transition-all font-label-md text-label-md text-on-surface group">
<span class="material-symbols-outlined text-[20px] text-on-surface-variant group-hover:text-on-surface transition-colors">language</span>
